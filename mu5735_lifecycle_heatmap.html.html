    // 构建时序走势
    let current = new Date(startDate);
    while (current <= endDate) {
        const year = current.getFullYear();
        const dateString = current.toISOString().split('T')[0];
        dateArray.push(dateString);

        if (exactOverrideData[dateString] !== undefined) {
            rawVolumeData.push(exactOverrideData[dateString]);
        } else {
            let baseline = 15;
            let randNoise = Math.sin(current.getTime() / (1000 * 60 * 60 * 24 * 7)) * 5 + Math.random() * 8;
            
            if (year === 2022) {
                baseline = 20;
                if (current.getMonth() === 3) baseline = 52;
                else if (current.getMonth() === 4) baseline = 40;
            } else if (year === 2023) {
                baseline = 24;
                if (current.getMonth() === 10) baseline = 42;
                else if (current.getMonth() === 2) baseline = 36;
            } else if (year === 2024) {
                baseline = 27;
                if (current.getMonth() === 11) baseline = 50;
                else if (current.getMonth() === 2) baseline = 35;
            } else if (year === 2025) {
                baseline = 30;
                if (current.getMonth() === 1) baseline = 55;
                else if (current.getMonth() === 2) baseline = 42;
            } else if (year === 2026) {
                baseline = 32;
                if (current.getMonth() === 4) baseline = 50;
                else if (current.getMonth() === 3) baseline = 40;
            }
            rawVolumeData.push(Math.max(2, Math.round(baseline + randNoise)));
        }
        current.setDate(current.getDate() + 1);
    }

                            { value: 1225, name: '3.21\n空难', coord: ['2022-03-22', 1225] },
                            { value: 376, name: '一周年\n回声', coord: ['2023-03-21', 376] },
                            { value: 129, name: '二周年\n通报', coord: ['2024-03-21', 129] },
                            { value: 1109, name: '济州\n空难', coord: ['2024-12-29', 1109] },
                            { value: 247, name: '三周年\n失约', coord: ['2025-03-23', 247] },
                            { value: 99, name: '四周年\n追索', coord: ['2026-03-22', 99] }
                        ]
                    }
                }
            ]
        };

        mainTimelineChart.setOption(option);

        // 绑定图表中 Pins (MarkPoints) 的悬停触发逻辑
        mainTimelineChart.on('mouseover', function(params) {
            let stageNum = 0;
            if (params.componentType === 'markPoint') {
                const name = params.data.name;
                if (name.includes('3.21')) stageNum = 1;
                else if (name.includes('一周年') || name.includes('二周年')) stageNum = 3;
                else if (name.includes('济州') || name.includes('三周年')) stageNum = 4;
                else if (name.includes('四周年')) stageNum = 5;
            }

            if (stageNum > 0) {
                showFloatingPanel(stageNum, params.event.event);
            }
        });

        mainTimelineChart.on('mousemove', function(params) {
            if (params.componentType === 'markPoint') {
                updatePanelPosition(params.event.event);
            }
        });

        mainTimelineChart.on('mouseout', function(params) {
            hideFloatingPanel();
        });
    }

    // ==========================================
    // ==========================================

    // 支持顶部导航按钮 Hover 直接触发
    function triggerButtonHover(stageNum, event) {
        showFloatingPanel(stageNum, event);
    }

    function showFloatingPanel(stageNum, event) {
        const panel = document.getElementById('hover-interpret-panel');
        const data = stageDetails[stageNum];

        // 更新解读文本与主视觉颜色
        document.getElementById('hover-badge').innerText = data.badge;
        document.getElementById('hover-badge').className = `px-1.5 py-0.5 rounded text-[9px] font-black uppercase text-[#ffffff] ${data.badgeColor}`;
        document.getElementById('hover-stage-tag').innerText = data.stageTag;
        document.getElementById('hover-title').innerText = data.title;
        document.getElementById('hover-anger').innerHTML = `<i class="fa-solid fa-face-angry text-[#de2910] mr-1"></i> ${data.anger}`;
        document.getElementById('hover-decay').innerText = data.decay;
        document.getElementById('hover-keywords').innerText = data.keywords;
        document.getElementById('hover-desc').innerText = data.desc;
        document.getElementById('hover-quote').innerText = data.quote;

        panel.classList.remove('hidden');
        panel.getBoundingClientRect(); // 触发生态流重绘，保障过渡顺滑
        panel.classList.remove('opacity-0');
        panel.classList.add('opacity-100');

        updatePanelPosition(event);
    }

    // 溢出防护的绝对位置随动定位
    function updatePanelPosition(event) {
        const panel = document.getElementById('hover-interpret-panel');
        if (panel.classList.contains('hidden')) return;

        const offsetX = 20;
        const offsetY = 20;
        let left = event.clientX + offsetX;
        let top = event.clientY + offsetY;

        const panelWidth = panel.offsetWidth || 340;
        const panelHeight = panel.offsetHeight || 380;

        // 右边界防线
        if (left + panelWidth > window.innerWidth) {
            left = event.clientX - panelWidth - offsetX;
        }
        // 底边界防线
        if (top + panelHeight > window.innerHeight) {
            top = event.clientY - panelHeight - offsetY;
        }

        panel.style.left = `${left}px`;
        panel.style.top = `${top}px`;
    }

    function hideFloatingPanel() {
        const panel = document.getElementById('hover-interpret-panel');
        panel.classList.remove('opacity-100');
        panel.classList.add('opacity-0');
        panel.classList.add('hidden');
    }

    function focusOnStage(stageNum) {
        let startPercent = 0;
        let endPercent = 100;

        switch (stageNum) {
            case 1: // 爆发期 2022.03.21 - 2022.04.20
                startPercent = 0;
                endPercent = 3.5;
                break;
            case 2: // 衰减期 2022.04.21 - 2022.12.31
                startPercent = 2.5;
                endPercent = 18;
                break;
            case 3: // 周年回声 2023.01.01 - 2024.11.30
                startPercent = 18;
                endPercent = 60;
                break;
            case 4: // 外部事件驱动期 2024.12.01 - 2025.05.31
                startPercent = 60;
                endPercent = 75;
                break;
            case 5: // 制度化追问期 2025.06.01 - 2026.07.06
                startPercent = 74;
                endPercent = 100;
                break;
        }

        mainTimelineChart.dispatchAction({
            type: 'dataZoom',
            start: startPercent,
            end: endPercent
        });
        
        syncHeaderBtnActive(stageNum);
    }

    // 激活阶段的视觉边框同步 (主打国航红高亮，钛灰底框)
    function syncHeaderBtnActive(stageNum) {
        for (let i = 1; i <= 5; i++) {
            const btn = document.getElementById(`btn-s${i}`);
            btn.classList.remove('bg-[#de2910]', 'text-[#ffffff]', 'scale-105', 'border', 'border-[#de2910]/40');
            btn.classList.add('text-[#cbd5e1]');
        }

        if (stageNum > 0) {
            const activeBtn = document.getElementById(`btn-s${stageNum}`);
            activeBtn.classList.remove('text-[#cbd5e1]');
            activeBtn.classList.add('bg-[#de2910]', 'text-[#ffffff]', 'scale-105', 'border', 'border-[#de2910]/40');
        }
    }

    function resetTimelineZoom() {
        mainTimelineChart.dispatchAction({
            type: 'dataZoom',
            start: 0,
            end: 100
        });
        syncHeaderBtnActive(0);
    }

    // 响应式自适应尺寸
    window.addEventListener('resize', function () {
        if (mainTimelineChart) {
            mainTimelineChart.resize();
        }
    });

    window.onload = function() {
        initChart();
    };
</script>
